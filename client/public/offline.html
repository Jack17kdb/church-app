<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Grace Community Church</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; background: #f9fafb; color: #1f2937;
      text-align: center; padding: 20px;
    }
    .container { max-width: 400px; }
    .icon { width: 64px; height: 64px; background: #7c3aed; border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M12 2 L12 22 M6 6 L18 6" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
  </div>
</body>
</html>
